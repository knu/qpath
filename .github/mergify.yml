queue_rules:
  - name: dependency-updates
    batch_size: 5
    batch_max_wait_time: 10 min
    checks_timeout: auto
    merge_method: merge-batch
    queue_conditions:
      - base = main
      - author ~= ^(dependabot|renovate)\[bot\]$
      - -draft
      - -conflict
      - label != dependencies:major
      - "#approved-reviews-by >= 1"
    merge_conditions:
      - "#approved-reviews-by >= 1"

pull_request_rules:
  - name: queue approved dependency updates
    conditions:
      - base = main
      - author ~= ^(dependabot|renovate)\[bot\]$
      - -draft
      - -conflict
      - label != dependencies:major
      - "#approved-reviews-by >= 1"
    actions:
      queue:
        name: dependency-updates
